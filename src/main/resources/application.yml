spring:
  application:
    name: lizi-ai-code
server:
  port: 8123
  servlet:
    context-path: /api

  # springdoc-openapi 接口文档配置
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.bear.liziaicode.controller
  # knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
