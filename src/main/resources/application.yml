spring:
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/lizi_ai_code?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 12345678
  application:
    name: lizi-ai-code
server:
  port: 8123
  servlet:
    context-path: /api

  # springdoc-openapi 接口文档配置
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.bear.liziaicode.controller
  # knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn


